<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>徽州建筑首页动效示意</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;background:#e9e2d6;font-family:"Noto Serif SC","STSong","Songti SC",serif;overflow:hidden}
    .hero{position:relative;height:100vh;width:100vw;background:#e7e1d7;isolation:isolate}
    .base{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.02);animation:kenburns 10s ease-out forwards}
    .fog,.ink,.ripple,.birds,.brackets,.seal,.hud,.title{position:absolute;pointer-events:none}
    .fog1{left:-6%;top:19%;width:58%;opacity:.56;animation:fogDrift1 18s ease-in-out infinite alternate}
    .fog2{right:-8%;top:27%;width:54%;opacity:.48;transform:scaleX(-1);animation:fogDrift2 22s ease-in-out infinite alternate}
    .ink{left:50%;top:47%;width:24vw;max-width:360px;transform:translate(-50%,-50%) scale(.84);opacity:0;animation:inkIn 1.2s 1.1s ease-out forwards}
    .title{left:50%;top:48%;transform:translate(-50%,-50%);display:flex;align-items:flex-start;gap:10px;color:#221d19;z-index:3}
    .title .col{display:flex;flex-direction:column;gap:4px}
    .title .ch{font-size:clamp(42px,5vw,88px);line-height:.92;font-weight:700;opacity:0;filter:blur(10px);transform:translateY(22px) scale(.96);animation:charIn .75s cubic-bezier(.22,1,.36,1) forwards}
    .title .small{font-size:clamp(26px,3vw,48px)}
    .title .c1{animation-delay:1.45s}.title .c2{animation-delay:1.53s}.title .c3{animation-delay:1.61s}.title .c4{animation-delay:1.69s}
    .title .c5{animation-delay:1.77s}.title .c6{animation-delay:1.85s}.title .c7{animation-delay:1.93s}.title .c8{animation-delay:2.01s}
    .brackets{left:50%;top:48%;width:220px;transform:translate(-50%,-50%);opacity:0;animation:fadeIn .8s 1.25s ease forwards}
    .ripple{left:50%;bottom:8%;width:min(58vw,880px);transform:translateX(-50%);opacity:0;mix-blend-mode:screen;animation:rippleIn 1.3s 2.2s ease forwards, rippleFloat 6s 3.2s ease-in-out infinite}
    .birds{right:10%;top:31%;width:88px;opacity:0;animation:birdIn .7s 2.2s ease forwards, birdFloat 8s 3s ease-in-out infinite}
    .seal{left:62%;top:63%;width:74px;opacity:0;transform:translate(-50%,-50%) scale(.72) rotate(-6deg);animation:sealIn .75s 2.25s cubic-bezier(.2,1.2,.25,1) forwards}
    .hud{left:50%;bottom:6%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fadeIn .9s 2.8s ease forwards;z-index:4}
    .hud .desc{font-size:13px;letter-spacing:.26em;color:rgba(255,250,238,.88);text-transform:uppercase}
    .btns{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);display:flex;gap:14px;z-index:4;opacity:0;animation:fadeIn .9s 2.55s ease forwards}
    .btn{pointer-events:auto;padding:12px 26px;border-radius:999px;border:1px solid rgba(246,242,232,.4);background:rgba(67,61,56,.34);backdrop-filter: blur(6px);color:#faf6ec;font-size:15px;letter-spacing:.12em}
    .btn.secondary{background:rgba(246,242,232,.14)}
    .paper{position:absolute;inset:0;opacity:.08;background-image:radial-gradient(circle at 20% 20%, rgba(255,255,255,.7) 0, rgba(255,255,255,0) 18%), radial-gradient(circle at 70% 80%, rgba(0,0,0,.35) 0, rgba(0,0,0,0) 16%), radial-gradient(circle at 60% 10%, rgba(255,255,255,.35) 0, rgba(255,255,255,0) 14%);mix-blend-mode:soft-light;z-index:5;pointer-events:none}
    @keyframes kenburns{to{transform:scale(1.06)}}
    @keyframes fogDrift1{from{transform:translateX(0) translateY(0)}to{transform:translateX(42px) translateY(-10px)}}
    @keyframes fogDrift2{from{transform:scaleX(-1) translateX(0) translateY(0)}to{transform:scaleX(-1) translateX(56px) translateY(12px)}}
    @keyframes inkIn{to{opacity:.95;transform:translate(-50%,-50%) scale(1)}}
    @keyframes charIn{to{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}}
    @keyframes fadeIn{to{opacity:1}}
    @keyframes rippleIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.96)}to{opacity:.92;transform:translateX(-50%) translateY(0) scale(1)}}
    @keyframes rippleFloat{50%{transform:translateX(-50%) translateY(5px)}}
    @keyframes birdIn{to{opacity:.55}}
    @keyframes birdFloat{50%{transform:translateY(-6px) translateX(10px)}}
    @keyframes sealIn{to{opacity:.92;transform:translate(-50%,-50%) scale(1) rotate(-4deg)}}
  </style>
</head>
<body>
  <section class="hero">
    <img class="base" src="/mnt/data/7550262533ca6bf9eb75933ad75c4f1b.jpg" alt="徽州山水底图" />
    <img class="fog fog1" src="./mist-band.svg" alt="" />
    <img class="fog fog2" src="./mist-band.svg" alt="" />
    <img class="ink" src="./ink-wash.svg" alt="" />
    <img class="brackets" src="./title-brackets.svg" alt="" />
    <div class="title" aria-label="数览徽筑，艺承千年">
      <div class="col"><span class="ch small c1">数</span><span class="ch small c2">览</span></div>
      <div class="col"><span class="ch c3">徽</span><span class="ch c4">筑</span><span class="ch c5">，</span></div>
      <div class="col"><span class="ch c6">艺</span><span class="ch c7">承</span><span class="ch c8">千年</span></div>
    </div>
    <img class="ripple" src="./ripple-lines.svg" alt="" />
    <img class="birds" src="./bird-duo.svg" alt="" />
    <img class="seal" src="./seal-frame.svg" alt="" />
    <div class="btns">
      <button class="btn">进入展卷</button>
      <button class="btn secondary">项目导览</button>
    </div>
    <div class="hud">
      <img src="./scroll-hint.svg" width="34" alt="" />
      <div class="desc">SCROLL TO EXPLORE</div>
    </div>
    <div class="paper"></div>
  </section>
</body>
</html>
