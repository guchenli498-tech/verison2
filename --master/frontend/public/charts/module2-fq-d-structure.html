<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粉墙相关防热贡献结构</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <style>
    :root {
      --paper-bg: #F8F6F0;
      --title-color: #2b333e;
      --subtitle-color: #8c939d;
      --line-color: #6C7A89;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background-color: var(--paper-bg);
      font-family: "KaiTi", "楷体", "华文楷体", STKaiti, Georgia, serif;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 14px;
      box-sizing: border-box;
      gap: 10px;
    }

    .header {
      margin-bottom: 0;
      position: relative;
      padding-left: 14px;
      border: 1px solid rgba(216, 207, 191, 0.9);
      border-radius: 12px;
      background: #efe8dc;
      padding-top: 8px;
      padding-bottom: 8px;
      padding-right: 12px;
    }
    .header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 2px;
      width: 4px;
      background: var(--line-color);
      border-radius: 2px;
    }
    .title {
      margin: 0 0 4px 0;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--title-color);
    }
    .chartBoard {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 12px;
      overflow: hidden;
    }

    .panel {
      width: 50%;
      min-width: 0;
      border: 1px solid rgba(216, 207, 191, 0.9);
      border-radius: 12px;
      background: #f4efe6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow: hidden;
    }

    .frameWrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 4px;
      box-sizing: border-box;
    }

    #chartA {
      width: 100%;
      height: 100%;
      background: transparent;
      border-radius: 8px;
    }

    #chart {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #f4efe6;
      overflow: hidden;
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">粉墙 · 防热贡献结构（图表四）</div>
    </div>

    <div class="chartBoard">
      <section class="panel">
        <div class="frameWrap">
          <div id="chartA"></div>
        </div>
      </section>

      <section class="panel">
        <div id="chart"></div>
      </section>
    </div>
  </div>

  <script>
    const chartA = echarts.init(document.getElementById("chartA"), null, {
      renderer: "canvas",
      devicePixelRatio: window.devicePixelRatio
    });
    const chart = echarts.init(document.getElementById("chart"), null, {
      renderer: "canvas",
      devicePixelRatio: window.devicePixelRatio
    });

    const walls = [
      "传统青砖\n空斗黄泥",
      "水墨宏村\n外保温",
      "际村自建房\n实砌做法",
      "新型水泥砖\n空斗砌法"
    ];
    const heatResistance = [0.379, 0.345, 0.129, 0.205];
    const heatTransferCoeff = [1.892, 2.024, 3.588, 2.821];
    const colorR = "#4f8891";
    const colorK = "#a1ba5b";
    const rMax = 0.45;
    const kMax = 4.0;
    const heatTransferScaled = heatTransferCoeff.map((v) => (v / kMax) * rMax);

    const optionA = {
      backgroundColor: "transparent",
      animationDuration: 1100,
      animationEasing: "cubicOut",
      color: [colorR, colorK],
      legend: {
        bottom: 0,
        left: "center",
        itemWidth: 12,
        itemHeight: 12,
        itemGap: 16,
        icon: "rect",
        textStyle: {
          color: "#5f6f7e",
          fontSize: 12,
          fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif'
        },
        data: ["热阻 R", "传热系数 K (已归一化显示)"]
      },
      tooltip: {
        trigger: "item",
        backgroundColor: "rgba(255, 255, 255, 0.96)",
        borderColor: "#dce3ea",
        borderWidth: 1,
        padding: [10, 14],
        textStyle: { color: "#3a4651", fontSize: 13 },
        formatter: function (p) {
          if (p.seriesName === "热阻 R") {
            return `<div style="font-weight:bold;margin-bottom:6px;">${p.name}</div>
                    热阻 R：<b style="color:${colorR}">${p.data.realValue.toFixed(3)}</b> m²·K/W`;
          }
          return `<div style="font-weight:bold;margin-bottom:6px;">${p.name}</div>
                  传热系数 K：<b style="color:${colorK}">${p.data.realValue.toFixed(3)}</b> W/(m²·K)`;
        }
      },
      polar: {
        center: ["50%", "48%"],
        radius: ["22%", "56%"]
      },
      angleAxis: {
        type: "category",
        data: walls,
        startAngle: 90,
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
          interval: 0,
          color: "#4a4036",
          fontSize: 13,
          lineHeight: 18,
          margin: 10,
          align: "center",
          fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif'
        }
      },
      radiusAxis: {
        min: 0,
        max: rMax,
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { show: false },
        splitNumber: 4,
        splitLine: {
          show: true,
          lineStyle: {
            color: "rgba(168, 158, 142, 0.25)",
            type: "dashed",
            width: 1
          }
        }
      },
      graphic: [{
        type: "text",
        left: "center",
        top: "49%",
        z: 5,
        style: {
          text: "R↑ 越大越优\n\nK↓ 越小越优",
          fill: "#556674",
          font: 'bold 12px "KaiTi", "楷体", STKaiti, serif',
          textAlign: "center",
          lineHeight: 12
        }
      }],
      series: [
        {
          name: "热阻 R",
          type: "bar",
          coordinateSystem: "polar",
          barWidth: "35%",
          barGap: "15%",
          data: heatResistance.map((val) => ({ value: val, realValue: val })),
          z: 2,
          itemStyle: { borderColor: "#f5f1e8", borderWidth: 1 }
        },
        {
          name: "传热系数 K (已归一化显示)",
          type: "bar",
          coordinateSystem: "polar",
          barWidth: "35%",
          barGap: "15%",
          data: heatTransferScaled.map((val, idx) => ({ value: val, realValue: heatTransferCoeff[idx] })),
          z: 2,
          itemStyle: { borderColor: "#f5f1e8", borderWidth: 1 }
        }
      ]
    };
    chartA.setOption(optionA);

    // 提取的主题色
    const colorTeal = "#4f778f";
    const colorRed = "#8c5f57";
    const colorGreen = "#6a8b75";
    const bgColor = "#f7f3ea";

    // 外圈数据（建筑部位）
    const outerData = [
      { name: "外墙", value: 48.7, itemStyle: { color: colorTeal } },
      { name: "屋顶", value: 39.7, itemStyle: { color: colorRed } },
      { name: "天井", value: 11.6, itemStyle: { color: colorGreen } }
    ];

    // 内圈数据（同色系渐变过渡，显得更有层次感）
    const innerData = [
      { parent: "外墙", name: "反射", value: 18.6, itemStyle: { color: "#4f778f" } },
      { parent: "外墙", name: "外遮阳", value: 14.1, itemStyle: { color: "#698fa4" } },
      { parent: "外墙", name: "墙体蓄热", value: 12.3, itemStyle: { color: "#84a8ba" } },
      { parent: "外墙", name: "对流换热", value: 2.9, itemStyle: { color: "#a2bfcd" } },
      { parent: "外墙", name: "长波辐射", value: 0.8, itemStyle: { color: "#c2d6e1" } },

      { parent: "屋顶", name: "反射", value: 21.3, itemStyle: { color: "#8c5f57" } },
      { parent: "屋顶", name: "墙体蓄热", value: 9.9, itemStyle: { color: "#a2766f" } },
      { parent: "屋顶", name: "对流换热", value: 7.3, itemStyle: { color: "#b9918b" } },
      { parent: "屋顶", name: "长波辐射", value: 1.2, itemStyle: { color: "#d1aea9" } },

      { parent: "天井", name: "自然通风", value: 10.3, itemStyle: { color: "#6a8b75" } },
      { parent: "天井", name: "水体蒸发", value: 1.3, itemStyle: { color: "#8eac98" } }
    ];

    const option = {
      animationDuration: 1000,
      animationEasing: "cubicOut",

      // 中心文字配置（比Graphic更好居中定位）
      title: {
        text: '防热贡献\n结构分解',
        left: 'center',
        top: 'center',
        textStyle: {
          color: '#5c5044',
          fontSize: 12,
          fontFamily: 'KaiTi',
          fontWeight: 'normal',
          lineHeight: 18
        }
      },

      // 提示框优化
      tooltip: {
        trigger: "item",
        backgroundColor: "rgba(253, 250, 243, 0.95)",
        borderColor: "#d1c7b6",
        borderWidth: 1,
        padding: [8, 12],
        textStyle: { color: "#4b4035", fontSize: 12, fontFamily: 'KaiTi' },
        formatter: (p) => {
          if (p.seriesName === "建筑部位贡献") {
            return `<b>${p.name}</b><br/>总防热贡献率：<b>${p.value.toFixed(1)}%</b>`;
          }
          const parent = innerData[p.dataIndex].parent;
          return `<b>${parent} · ${p.name}</b><br/>策略贡献率：<b>${p.value.toFixed(1)}%</b>`;
        }
      },

      // 图例：移到底部，采用方块，符合原图UI
      legend: {
        bottom: 0,
        left: "center",
        icon: "rect",
        itemWidth: 12,
        itemHeight: 12,
        itemGap: 20,
        textStyle: { color: "#6d6154", fontSize: 12, fontFamily: 'KaiTi' },
        data: ["外墙", "屋顶", "天井"]
      },

      series: [
        // 内圈：策略细分（隐藏标签，保持画面整洁）
        {
          name: "策略细分贡献",
          type: "pie",
          radius: ["33%", "51%"],
          center: ["50%", "46%"],
          startAngle: 90,
          itemStyle: {
            borderColor: bgColor,
            borderWidth: 1.5
          },
          label: { show: false }, // 隐藏内圈文字，避免拥挤
          labelLine: { show: false },
          data: innerData,
          z: 2
        },
        // 外圈：建筑部位贡献（展示主标签）
        {
          name: "建筑部位贡献",
          type: "pie",
          radius: ["56%", "74%"],
          center: ["50%", "46%"],
          startAngle: 90,
          itemStyle: {
            borderColor: bgColor,
            borderWidth: 2.5
          },
          label: {
            position: 'outside',
            color: "#4f4438",
            formatter: "{b}\n{d}%",
            fontSize: 12,
            fontFamily: 'KaiTi',
            lineHeight: 16
          },
          labelLine: {
            length: 15,
            length2: 10,
            smooth: true,
            lineStyle: { color: "#b5a898", width: 1 }
          },
          data: outerData,
          z: 3
        }
      ]
    };

    chart.setOption(option);
    window.addEventListener("resize", () => {
      chartA.resize();
      chart.resize();
    });
  </script>
</body>
</html>
