<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天井性能 · 平行坐标图</title>
    <script src="../echarts.min.js"></script>
    <style>
      :root {
        --paper-bg: #F8F6F0;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--paper-bg);
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 20px;
        position: relative;
        padding-left: 14px;
      }

      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      .subtitle {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--subtitle-color);
        text-transform: uppercase;
      }

      #chart {
        flex: 1;
        width: 100%;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">天井 · 多维度性能分析平行坐标</div>
        <div class="subtitle">Parallel Coordinates of Courtyard Performance</div>
      </div>
      <div id="chart"></div>
    </div>

    <script>
      (function () {
        const dom = document.getElementById("chart");
        const chart = echarts.init(dom, null, {
          renderer: "canvas",
          devicePixelRatio: Math.max(1, window.devicePixelRatio || 1),
        });

        // 16种天井平面形态数据（与气泡图一致）
        const data = [
          [3.85, 1.05, 4.04, 44.2, 8.02, 31, "M1J1"],
          [3.85, 1.75, 6.73, 54.54, 5.94, 28, "M1J2"],
          [3.85, 2.10, 8.09, 57.68, 5.23, 30, "M1J3"],
          [3.85, 2.80, 10.78, 64.14, 4.36, 25, "M1J4"],
          [5.25, 1.05, 5.51, 44.2, 8.02, 50, "M2J1"],
          [5.25, 1.75, 9.19, 54.54, 5.94, 54, "M2J2"],
          [5.25, 2.10, 11.02, 57.68, 5.23, 56, "M2J3"],
          [5.25, 2.80, 14.70, 64.14, 4.36, 60, "M2J4"],
          [6.30, 1.05, 6.62, 57.61, 8.71, 48, "M3J1"],
          [6.30, 1.75, 11.03, 61.54, 5.58, 52, "M3J2"],
          [6.30, 2.10, 13.23, 64.30, 4.86, 55, "M3J3"],
          [6.30, 2.80, 17.64, 67.17, 3.81, 58, "M3J4"],
          [7.35, 1.05, 7.72, 60.20, 8.20, 52, "M4J1"],
          [7.35, 1.75, 12.86, 64.80, 5.30, 58, "M4J2"],
          [7.35, 2.10, 15.44, 67.50, 4.50, 62, "M4J3"],
          [7.35, 2.80, 20.58, 70.00, 3.60, 66, "M4J4"],
        ];

        // 线色采用高对比离散色板，视觉更接近你给的第二张图
        const linePalette = [
          "#3f5f7f", "#d65a3a", "#69a36f", "#e0ad46",
          "#5d748e", "#c44730", "#5f9f67", "#d89d33",
          "#4f7e70", "#c45e3a", "#6c8f57", "#8aa2b9",
          "#4b6d8a", "#cf7048", "#6ea783", "#9c8d67",
        ];

        const option = {
          backgroundColor: "transparent",
          tooltip: {
            trigger: "item",
            backgroundColor: "rgba(45,35,22,0.88)",
            borderColor: "#c8b88a",
            borderWidth: 1,
            padding: [12, 16],
            textStyle: { color: "#f7efdb", fontSize: 12, fontFamily: "KaiTi, serif" },
            formatter: function (p) {
              if (p.componentSubType === "parallel") {
                const d = p.value;
                return `<strong>${d[6]}</strong><br/>
                  面阔：${d[0]} m<br/>
                  进深：${d[1]} m<br/>
                  面积：${d[2].toFixed(1)} ㎡<br/>
                  和风区占比：${d[3]}%<br/>
                  单位风速：${d[4]}%<br/>
                  综合得分：${d[5]}`;
              }
              return p.name;
            },
          },
          parallelAxis: [
            { dim: 0, name: "面阔（m）", type: "value", min: 3.5, max: 7.6 },
            { dim: 1, name: "进深（m）", type: "value", min: 1, max: 3 },
            { dim: 2, name: "面积（㎡）", type: "value", min: 4, max: 22 },
            { dim: 3, name: "和风区占比（%）", type: "value", min: 45, max: 72 },
            { dim: 4, name: "单位风速（%）", type: "value", min: 3, max: 9 },
            { dim: 5, name: "综合得分", type: "value", min: 20, max: 70 },
          ],
          parallel: {
            left: "7%",
            right: "10%",
            top: "10%",
            bottom: "10%",
            layout: "horizontal",
            parallelAxisDefault: {
              nameLocation: "middle",
              nameGap: 26,
              nameTextStyle: { color: "#7f684c", fontSize: 12, fontFamily: "KaiTi, serif" },
              axisLine: { lineStyle: { color: "#bcab8a", width: 1.6 } },
              axisLabel: { color: "#6f5d48", fontSize: 10 },
            },
          },
          series: [
            {
              type: "parallel",
              data: data,
              lineStyle: {
                width: 2.1,
                opacity: 0.82,
              },
              smooth: 0.15,
              inactiveOpacity: 0.18,
              itemStyle: {
                borderWidth: 0,
              },
              emphasis: {
                lineStyle: {
                  width: 4,
                  opacity: 1,
                },
              },
            },
          ],
        };

        // 为每条线着色（独立颜色，提高可分辨性）
        const seriesData = data.map((d) => ({
          value: d,
          lineStyle: {
            color: linePalette[parseInt(d[6].slice(3), 10) - 1] || "#6f7f8f",
            width: 2.1,
            opacity: 0.82,
          },
          emphasis: {
            lineStyle: {
              width: 4,
              opacity: 1,
            },
          },
        }));

        option.series[0].data = seriesData;

        chart.setOption(option);

        window.addEventListener("resize", () => {
          chart.resize();
        });
      })();
    </script>
  </body>
</html>
