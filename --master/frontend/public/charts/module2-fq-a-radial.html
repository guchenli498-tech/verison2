<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粉墙热工性能对比</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <style>
    :root {
      --paper-bg: #f4efe6;
      --title-color: #2b333e;
      --line-color: #6C7A89;
      --edge: #ddd3c3;
      --text: #5b4e41;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--paper-bg);
      font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      padding: 14px 16px 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    body[data-embed="1"] .wrap {
      padding: 6px 8px;
    }

    .header {
      position: relative;
      padding-left: 14px;
      border: 1px solid rgba(216, 207, 191, 0.9);
      border-radius: 12px;
      background: #efe8dc;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-right: 14px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .header::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 2px;
      width: 4px;
      background: var(--line-color);
      border-radius: 2px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #3b342b;
      margin: 0;
      line-height: 1.25;
      font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
    }
    body[data-embed="1"] .header {
      display: none;
    }

    .combo {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 14px;
    }

    .leftPane {
      width: 62%;
      min-width: 0;
      border: 1px solid rgba(216, 207, 191, 0.9);
      border-radius: 16px;
      background: linear-gradient(180deg, #f6f1e8 0%, #f3ede2 100%);
      padding: 10px 10px 6px;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 20px -20px rgba(59, 52, 43, 0.35);
    }

    .rightPane {
      width: 38%;
      min-width: 0;
      border: 1px solid rgba(216, 207, 191, 0.9);
      border-radius: 16px;
      background: linear-gradient(180deg, #f7f2e9 0%, #f2ecdf 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 20px -20px rgba(59, 52, 43, 0.35);
    }

    .wallHint {
      font-size: 13px;
      color: #6f6152;
      letter-spacing: 0.8px;
    }

    .wallIllustration {
      width: 86%;
      height: 82%;
      border: 1px dashed #ccbfae;
      border-radius: 12px;
      background: linear-gradient(180deg, #fbf6ed 0%, #f5efe3 100%);
      box-sizing: border-box;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .wallTypeLabel {
      font-size: 16px;
      font-weight: 700;
      color: #4f4338;
      text-align: center;
      letter-spacing: 1px;
    }

    .wallImageWrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(183, 157, 88, 0.4);
      border-radius: 10px;
      background: #f7f0e2;
      overflow: hidden;
    }

    .wallImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .wallMeta {
      font-size: 13px;
      color: #6f6255;
      text-align: center;
      line-height: 1.4;
    }

    #main {
      width: 100%;
      height: 100%;
      min-height: 260px;
      background: transparent;
    }

    body[data-embed="1"] .rightPane {
      display: none;
    }
    body[data-embed="1"] .leftPane {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">粉墙 · 砌筑方式热工性能综合对比</div>
    </div>

    <div class="combo">
      <section class="leftPane">
        <div id="main"></div>
      </section>
      <section class="rightPane" aria-label="砌筑方式示意图">
        <div class="wallHint">点击左图类目可切换右侧示意</div>
        <div class="wallIllustration" id="wallIllustration"></div>
      </section>
    </div>
  </div>

  <script>
    const isEmbed = new URLSearchParams(window.location.search).get("embed") === "1";
    if (isEmbed) {
      document.body.setAttribute("data-embed", "1");
    }

    const wallRoot = document.getElementById("wallIllustration");

    const chartDom = document.getElementById('main');
    const myChart = echarts.init(chartDom, null, {
      renderer: 'canvas',
      devicePixelRatio: window.devicePixelRatio
    });

    const categories = [
      '单墙',
      '立砖实砌',
      '一眠一斗',
      '一眠二斗',
      '一眠三斗',
      '全斗墙',
      '两平一侧'
    ];

    // 文献表格数据（《徽州民居围护结构的防热机理和做法》表1）
    const thermalConductivity = [0.65, 0.65, 0.55, 0.54, 0.54, 0.68, 0.59]; // λ
    const thermalResistance = [0.23, 0.46, 0.55, 0.56, 0.56, 0.57, 0.51];   // R
    const heatTransfer = [4.35, 2.17, 1.82, 1.79, 1.79, 1.75, 1.96];         // K

    // 配色统一：面积图（上排）+ 平均值虚线（下排）
    const areaColors = ["#84a8ba", "#b9918b", "#6a8b75"];
    const avgLineColors = ["#a0cce2", "#f3d7d2", "#9fd1b0"];
    const names = ["导热系数", "热阻", "传热系数"];
    const wallTypeGroup = ["青砖实砌墙", "青砖实砌墙", "青砖空斗墙", "青砖空斗墙", "青砖空斗墙", "青砖空斗墙", "青砖空斗墙"];
    const wallImageMap = [
      { file: "single-wall.svg", note: "" },
      { file: "solid-wall.svg", note: "" },
      { file: "one-sleep-one-dou.svg", note: "" },
      { file: "one-sleep-two-dou.svg", note: "" },
      { file: "one-sleep-three-dou.svg", note: "" },
      { file: "all-dou-wall.svg", note: "" },
      { file: "all-dou-wall.svg", note: "（两平一侧原图暂缺，先用全斗墙示意）" }
    ];

    function avg(arr) {
      return +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2);
    }

    const avgVals = [
      avg(thermalConductivity),
      avg(thermalResistance),
      avg(heatTransfer)
    ];

    const maxY = Math.max(...heatTransfer) * 1.2;

    function renderWallPattern(index) {
      if (!wallRoot) return;
      const safeIndex = Math.max(0, Math.min(categories.length - 1, Number(index) || 0));
      const imageCfg = wallImageMap[index] || wallImageMap[0];
      const typeName = categories[safeIndex] || "";
      const groupName = wallTypeGroup[safeIndex] || "";
      wallRoot.innerHTML = `
        <div class="wallTypeLabel">${typeName}</div>
        <div class="wallImageWrap">
          <img class="wallImage" src="./module2-fq-wall-types/${(wallImageMap[safeIndex] || wallImageMap[0]).file}" alt="${typeName}砌筑示意图" />
        </div>
        <div class="wallMeta">${groupName}${(wallImageMap[safeIndex] || wallImageMap[0]).note}</div>
      `;
    }

    function normalizeCategoryIndex(rawValue) {
      if (typeof rawValue === "number" && !Number.isNaN(rawValue)) {
        const idx = Math.round(rawValue);
        if (idx >= 0 && idx < categories.length) return idx;
      }
      if (typeof rawValue === "string") {
        const idx = categories.indexOf(rawValue);
        if (idx >= 0) return idx;
      }
      return -1;
    }

    const option = {
      backgroundColor: 'transparent',
      animationDuration: 1200,
      animationEasing: 'cubicOut',
      color: areaColors,

      legend: {
        bottom: 0,
        left: 'center',
        icon: 'roundRect',
        itemWidth: 16,
        itemHeight: 10,
        itemGap: 18,
        textStyle: {
          color: '#56493d',
          fontSize: 12,
          fontWeight: 600,
          fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif'
        },
        data: names
      },

      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'line', lineStyle: { color: '#b9ad9c' } },
        backgroundColor: 'rgba(255, 255, 255, 0.96)',
        borderColor: '#dce3ea',
        borderWidth: 1,
        padding: [12, 16],
        textStyle: { color: '#3a4651', fontSize: 13 },
        formatter: (params) => {
          if (!params || !params.length) return "";
          const idx = params[0].dataIndex;
          const lines = params.map((it) => `${it.marker}${it.seriesName}: <b>${Number(it.value).toFixed(2)}</b>`);
          return `<div style="margin-bottom:6px;font-weight:700;">${categories[idx]}</div>${lines.join("<br/>")}`;
        }
      },

      grid: {
        left: 44,
        right: 24,
        top: 22,
        bottom: 54
      },

      xAxis: {
        type: 'category',
        data: categories,
        boundaryGap: false,
        axisLine: { lineStyle: { color: '#c6bcad' } },
        axisTick: { show: false },
        axisLabel: {
          interval: 0,
          color: '#5c5044',
          fontSize: 12,
          fontWeight: 600,
          lineHeight: 16,
          margin: 12,
          align: 'center',
          fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif'
        }
      },

      yAxis: {
        type: 'value',
        min: 0,
        max: maxY,
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
          color: '#857564',
          fontSize: 11
        },
        splitLine: {
          lineStyle: { color: 'rgba(168, 158, 142, 0.18)', type: 'dashed' }
        }
      },

      series: [
        ["导热系数", thermalConductivity, 0],
        ["热阻", thermalResistance, 1],
        ["传热系数", heatTransfer, 2]
      ].map(([name, data, idx]) => ({
          name,
          type: 'line',
          stack: "wall-stack",
          smooth: true,
          symbol: "none",
          lineStyle: { width: 0 },
          areaStyle: { color: areaColors[idx], opacity: 0.88 },
          itemStyle: {
            color: areaColors[idx]
          },
          emphasis: { focus: "series" },
          data,
          markLine: {
            silent: true,
            symbol: "none",
            label: { show: false },
            lineStyle: {
              color: avgLineColors[idx],
              type: "dashed",
              width: 2
            },
            data: [{ yAxis: avgVals[idx] }]
          }
        })),
      graphic: [
        {
          type: "line",
          left: "22%",
          top: "16%",
          shape: { x1: 0, y1: 0, x2: 0, y2: 215 },
          style: {
            stroke: "#a79a89",
            lineWidth: 1.5,
            lineDash: [6, 5]
          }
        },
        {
          type: "text",
          left: "7%",
          top: "9%",
          style: {
            text: "青砖实砌墙",
            fill: "#6e6153",
            font: '13px "KaiTi", "楷体", serif'
          }
        },
        {
          type: "text",
          left: "27%",
          top: "9%",
          style: {
            text: "青砖空斗墙",
            fill: "#6e6153",
            font: '13px "KaiTi", "楷体", serif'
          }
        }
      ]
    };

    setTimeout(() => {
      myChart.resize();
      myChart.setOption(option);
      renderWallPattern(0);
    }, 50);

    // 主联动：跟随类目轴指示器，稳定获取当前横轴类目
    myChart.on("updateAxisPointer", (event) => {
      const xAxisInfo = event?.axesInfo?.find((it) => it.axisDim === "x");
      if (!xAxisInfo) return;
      const idx = normalizeCategoryIndex(xAxisInfo.value);
      if (idx >= 0) {
        renderWallPattern(idx);
      }
    });

    // 点击仍保留（确保用户点击类目区也会更新）
    myChart.getZr().on("click", (evt) => {
      const pixel = [evt.offsetX, evt.offsetY];
      if (!myChart.containPixel({ gridIndex: 0 }, pixel)) return;
      const pointData = myChart.convertFromPixel({ xAxisIndex: 0 }, pixel);
      const idx = Array.isArray(pointData) ? normalizeCategoryIndex(pointData[0]) : -1;
      if (idx >= 0) renderWallPattern(idx);
    });

    window.addEventListener('resize', function () {
      myChart.resize();
    });
  </script>
</body>
</html>
